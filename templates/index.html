<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tic Tac Toe</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'neon-cyan': '#22d3ee',
            'neon-pink': '#f472b6',
          },
          boxShadow: {
            'neon-cyan': '0 0 15px rgba(34,211,238,0.5)',
            'neon-pink': '0 0 15px rgba(244,114,182,0.5)',
            '3d-board': '0 20px 50px rgba(0,0,0,0.5)',
          }
        }
      }
    }
</script>
<style>
    /* ── THEMES ── */
    [data-theme="default"] {
        --x: #f472b6; --x-glow: rgba(244,114,182,0.4);
        --o: #22d3ee; --o-glow: rgba(34,211,238,0.4);
        --bg1: #1e293b; --bg2: #020617;
        --card: rgba(30,41,59,0.8); --border: rgba(255,255,255,0.05);
        --btn-grad: linear-gradient(to right, #22d3ee, #f472b6);
    }
    [data-theme="cyberpunk"] {
        --x: #39ff14; --x-glow: rgba(57,255,20,0.4);
        --o: #ff6a00; --o-glow: rgba(255,106,0,0.4);
        --bg1: #0a1a0a; --bg2: #020a02;
        --card: rgba(10,26,10,0.8); --border: rgba(57,255,20,0.08);
        --btn-grad: linear-gradient(to right, #39ff14, #ff6a00);
    }
    [data-theme="luxury"] {
        --x: #c9960c; --x-glow: rgba(201,150,12,0.4);
        --o: #e8e8e8; --o-glow: rgba(232,232,232,0.3);
        --bg1: #1a1508; --bg2: #0a0800;
        --card: rgba(26,21,8,0.9); --border: rgba(201,150,12,0.1);
        --btn-grad: linear-gradient(to right, #c9960c, #e8b84b);
    }
    [data-theme="synthwave"] {
        --x: #bf00ff; --x-glow: rgba(191,0,255,0.4);
        --o: #00ffe5; --o-glow: rgba(0,255,229,0.4);
        --bg1: #1a0030; --bg2: #0a0015;
        --card: rgba(26,0,48,0.85); --border: rgba(191,0,255,0.08);
        --btn-grad: linear-gradient(to right, #bf00ff, #00ffe5);
    }
    [data-theme="aggressive"] {
        --x: #ff1a1a; --x-glow: rgba(255,26,26,0.4);
        --o: #f0f0f0; --o-glow: rgba(240,240,240,0.3);
        --bg1: #1a0000; --bg2: #060000;
        --card: rgba(26,0,0,0.9); --border: rgba(255,26,26,0.08);
        --btn-grad: linear-gradient(to right, #ff1a1a, #880000);
    }

    * { transition: background 0.4s, border-color 0.4s, color 0.3s; }

    body {
        background: radial-gradient(circle at 50% 50%, var(--bg1) 0%, var(--bg2) 100%);
        perspective: 1200px;
        min-height: 100vh;
        font-family: 'DM Sans', sans-serif;
    }

    .board-container {
        transform-style: preserve-3d;
        transform: rotateX(0deg) rotateZ(0deg);
        transition: transform 0.6s cubic-bezier(0.2,0.8,0.2,1), background 0.4s;
        background: var(--card);
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7), 0 0 0 1px var(--border), inset 0 1px 1px rgba(255,255,255,0.1);
    }
    .board-container:hover { transform: rotateX(0deg) rotateZ(0deg); }

    .cell {
        transform-style: preserve-3d;
        transition: all 0.3s ease;
        position: relative;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
    }
    .cell::after {
        content: '';
        position: absolute; inset: 0;
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 12px;
        pointer-events: none;
    }
    .cell:hover {
        background: rgba(51,65,85,0.4);
        transform: scale(1.06);
        box-shadow: 0 0 20px var(--o-glow), inset 0 0 15px rgba(255,255,255,0.04);
        border-color: rgba(255,255,255,0.15) !important;
        z-index: 2;
    }
    .cell:active {
        transform: scale(0.96);
        box-shadow: 0 0 8px var(--x-glow);
    }

    /* X shape */
    .shape-x {
        position: relative; width: 60%; height: 60%;
        transform: translateZ(30px);
        transform-style: preserve-3d;
        animation: float-3d 4s ease-in-out infinite;
    }
    .shape-x::before, .shape-x::after {
        content: '';
        position: absolute; width: 100%; height: 20%; top: 40%;
        background: linear-gradient(to right, var(--x), color-mix(in srgb, var(--x) 70%, black));
        box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px var(--x-glow);
        border-radius: 4px;
    }
    .shape-x::before { transform: rotate(45deg) translateZ(5px); border: 1px solid rgba(255,255,255,0.2); }
    .shape-x::after  { transform: rotate(-45deg) translateZ(5px); border: 1px solid rgba(255,255,255,0.2); }

    /* O shape */
    .shape-o {
        width: 65%; height: 65%; border-radius: 50%;
        transform: translateZ(30px);
        transform-style: preserve-3d;
        border: 12px solid var(--o);
        background: transparent;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 20px var(--o-glow), inset 0 0 15px var(--o-glow);
        position: relative;
        animation: float-3d 4s ease-in-out infinite reverse;
    }
    .shape-o::after {
        content: '';
        position: absolute; inset: -14px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        transform: translateZ(2px);
    }

    @keyframes float-3d {
        0%,100% { transform: translateZ(30px) rotateY(0deg) translateY(0); }
        50%      { transform: translateZ(45px) rotateY(10deg) translateY(-8px); }
    }

    @keyframes pulse-glow {
        0%,100% { box-shadow: inset 0 0 30px var(--o-glow), 0 0 20px var(--o-glow); }
        50%      { box-shadow: inset 0 0 60px var(--o-glow), 0 0 40px var(--o-glow); }
    }

    .winning-line {
        background: rgba(34,211,238,0.1) !important;
        border: 1px solid rgba(34,211,238,0.5) !important;
        animation: pulse-glow 1.5s infinite ease-in-out !important;
        z-index: 10;
    }

    .warn-x { box-shadow: inset 0 0 20px var(--x-glow), 0 0 12px var(--x-glow) !important; border: 1px solid var(--x) !important; }
    .warn-o { box-shadow: inset 0 0 20px var(--o-glow), 0 0 12px var(--o-glow) !important; border: 1px solid var(--o) !important; }

    

    /* Bottom info bar */
    .info-bar {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 16px;
        justify-content: center;
    }
    .info-bar-divider { width:1px; height:12px; background: rgba(255,255,255,0.15); }
    .top-bar-text { font-size: 0.72rem; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; }
    .rules-link {
        font-size: 0.72rem; color: rgba(255,255,255,0.4);
        text-decoration: none; letter-spacing: 0.08em;
        transition: color 0.2s;
        display: flex; align-items: center; gap: 5px;
    }
    .rules-link:hover { color: rgba(255,255,255,0.9); }

    /* Side theme switcher */
    .theme-bar {
        position: fixed; right: 20px; top: 50%;
        transform: translateY(-50%);
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(12px);
        border-radius: 99px;
        padding: 14px 10px;
        z-index: 200;
        animation: slideLeft 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    .theme-label {
        font-size: 0.52rem; letter-spacing: 0.2em; text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        writing-mode: vertical-rl; text-orientation: mixed;
        transform: rotate(180deg); margin-bottom: 4px;
    }
    .theme-btn {
        width: 22px; height: 22px; border-radius: 50%;
        border: 2px solid transparent; cursor: pointer;
        transition: all 0.2s ease; outline: none;
    }
    .theme-btn:hover { transform: scale(1.25); }
    .theme-btn.active { border-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.3); transform: scale(1.15); }
    .theme-btn[data-t="default"]    { background: linear-gradient(135deg,#22d3ee,#f472b6); }
    .theme-btn[data-t="cyberpunk"]  { background: linear-gradient(135deg,#39ff14,#ff6a00); }
    .theme-btn[data-t="luxury"]     { background: linear-gradient(135deg,#c9960c,#f5e6c0); }
    .theme-btn[data-t="synthwave"]  { background: linear-gradient(135deg,#bf00ff,#00ffe5); }
    .theme-btn[data-t="aggressive"] { background: linear-gradient(135deg,#ff1a1a,#444); }

    /* Win overlay */
    #win-overlay { transition: all 0.5s cubic-bezier(0.4,0,0.2,1); }

    @keyframes slideDown {
        from { opacity:0; transform: translateX(-50%) translateY(-16px); }
        to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes slideLeft {
        from { opacity:0; transform: translateY(-50%) translateX(20px); }
        to   { opacity:1; transform: translateY(-50%) translateX(0); }
    }
</style>
</head>
<body class="h-screen flex flex-col items-center justify-center text-slate-100 overflow-hidden">



<!-- Theme switcher -->
<div class="theme-bar">
    <span class="theme-label">Theme</span>
    <button class="theme-btn active" data-t="default"    onclick="setTheme('default')"    title="Blue & Pink"></button>
    <button class="theme-btn"        data-t="cyberpunk"  onclick="setTheme('cyberpunk')"  title="Cyberpunk"></button>
    <button class="theme-btn"        data-t="luxury"     onclick="setTheme('luxury')"     title="Luxury Gold"></button>
    <button class="theme-btn"        data-t="synthwave"  onclick="setTheme('synthwave')"  title="Synthwave"></button>
    <button class="theme-btn"        data-t="aggressive" onclick="setTheme('aggressive')" title="Red & Black"></button>
</div>

<!-- Header -->
<header class="mb-10 text-center z-10">
    <h1 class="text-5xl font-black uppercase tracking-widest mb-5 bg-clip-text text-transparent" style="background-image: var(--btn-grad); -webkit-background-clip: text;">
        Tic Tac Toe
    </h1>
    <div class="flex gap-6 justify-center items-center bg-slate-800/50 backdrop-blur-md p-4 rounded-2xl border border-slate-700 shadow-xl">
        <div class="flex flex-col items-center px-4">
            <span class="text-xs uppercase tracking-tighter text-slate-400">Player X</span>
            <span class="text-2xl font-bold" id="score-x-val" style="color: var(--x);">0</span>
        </div>
        <div class="h-10 w-px bg-slate-600"></div>
        <div class="flex flex-col items-center px-4">
            <span class="text-xs uppercase tracking-tighter text-slate-400">Turn</span>
            <span class="text-lg font-bold italic" id="current-player-text" style="color: var(--x);">PLAYER X</span>
        </div>
        <div class="h-10 w-px bg-slate-600"></div>
        <div class="flex flex-col items-center px-4">
            <span class="text-xs uppercase tracking-tighter text-slate-400">Player O</span>
            <span class="text-2xl font-bold" id="score-o-val" style="color: var(--o);">0</span>
        </div>
    </div>
</header>

<!-- Board -->
<main class="relative">
    <div class="board-container p-6 rounded-3xl border border-slate-700/50 grid grid-cols-3 gap-4 w-80 h-80 sm:w-96 sm:h-96" id="grid">
        <div class="cell bg-slate-900/40 rounded-xl flex items-center justify-center cursor-pointer" data-index="0"></div>
        <div class="cell bg-slate-900/40 rounded-xl flex items-center justify-center cursor-pointer" data-index="1"></div>
        <div class="cell bg-slate-900/40 rounded-xl flex items-center justify-center cursor-pointer" data-index="2"></div>
        <div class="cell bg-slate-900/40 rounded-xl flex items-center justify-center cursor-pointer" data-index="3"></div>
        <div class="cell bg-slate-900/40 rounded-xl flex items-center justify-center cursor-pointer" data-index="4"></div>
        <div class="cell bg-slate-900/40 rounded-xl flex items-center justify-center cursor-pointer" data-index="5"></div>
        <div class="cell bg-slate-900/40 rounded-xl flex items-center justify-center cursor-pointer" data-index="6"></div>
        <div class="cell bg-slate-900/40 rounded-xl flex items-center justify-center cursor-pointer" data-index="7"></div>
        <div class="cell bg-slate-900/40 rounded-xl flex items-center justify-center cursor-pointer" data-index="8"></div>
    </div>
    <div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-3/4 h-8 bg-black/40 blur-2xl rounded-[100%]"></div>
</main>

<!-- Win overlay -->
<div class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-xl opacity-0 pointer-events-none" id="win-overlay">
    <div class="text-center transform scale-90 transition-transform duration-500" id="win-content">
        <div class="text-6xl mb-4" id="win-emoji">🎉</div>
        <h2 class="text-8xl font-black italic mb-2 text-white drop-shadow-[0_0_30px_rgba(255,255,255,0.3)]">WINNER!</h2>
        <div class="text-4xl font-bold uppercase tracking-[0.3em] mb-12" id="winner-name">PLAYER X</div>
        <button class="px-12 py-5 text-white font-black rounded-full hover:scale-110 active:scale-95 transition-all shadow-2xl uppercase tracking-widest text-lg" style="background: var(--btn-grad);" onclick="closeOverlay()">
            PLAY AGAIN
        </button>
    </div>
</div>

<!-- Footer -->
<footer class="mt-10 z-10 flex flex-col items-center gap-3">
    <button class="px-10 py-4 bg-white text-slate-900 font-black rounded-full hover:scale-110 active:scale-95 transition-all shadow-xl uppercase tracking-widest text-sm" onclick="newGame()">
        NEW GAME
    </button>
    <div class="info-bar">
        <span class="top-bar-text" id="counter">Games played: 0</span>
        <div class="info-bar-divider"></div>
        <a href="/rules" class="rules-link">📖 How to Play</a>
    </div>
</footer>

<script>
    // ── Theme ──
    function setTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
        localStorage.setItem('ttt-theme', t);
    }
    const saved = localStorage.getItem('ttt-theme');
    if (saved) setTheme(saved);

    // ── State ──
    let gamesPlayed = 0;
    let scores = { X: 0, O: 0 };
    let lastPlacedIndex = null;
    let placedX = [];
    let placedO = [];

    const cells = document.querySelectorAll('.cell');
    const playerDisplay = document.getElementById('current-player-text');
    const winOverlay = document.getElementById('win-overlay');
    const winContent = document.getElementById('win-content');

    // ── Render ──
    function renderBoard(board, pX, pO) {
        placedX = pX; placedO = pO;
        cells.forEach((cell, i) => {
            cell.innerHTML = '';
            cell.classList.remove('winning-line', 'warn-x', 'warn-o');

            if (board[i] === 'X') {
                const shape = document.createElement('div');
                shape.classList.add('shape-x');
                cell.appendChild(shape);
            } else if (board[i] === 'O') {
                const shape = document.createElement('div');
                shape.classList.add('shape-o');
                cell.appendChild(shape);
            }

            if (pX.length === 3 && i === pX[0]) cell.classList.add('warn-x');
            if (pO.length === 3 && i === pO[0]) cell.classList.add('warn-o');
        });
    }

    function setStatus(player) {
        playerDisplay.textContent = `PLAYER ${player}`;
        playerDisplay.style.color = player === 'X' ? 'var(--x)' : 'var(--o)';
        document.getElementById('score-x-val').style.color = 'var(--x)';
        document.getElementById('score-o-val').style.color = 'var(--o)';
    }

    function highlightWin(board) {
        const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for (const [a,b,c] of lines) {
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                cells[a].classList.add('winning-line');
                cells[b].classList.add('winning-line');
                cells[c].classList.add('winning-line');
                break;
            }
        }
    }

    function showOverlay(type, winner, board) {
        if (type === 'win') {
            highlightWin(board);
            scores[winner]++;
            document.getElementById('score-x-val').textContent = scores.X;
            document.getElementById('score-o-val').textContent = scores.O;
            triggerConfetti();
            setTimeout(() => {
                document.getElementById('win-emoji').textContent = '🎉';
                const nameEl = document.getElementById('winner-name');
                nameEl.textContent = `PLAYER ${winner}`;
                nameEl.style.color = winner === 'X' ? 'var(--x)' : 'var(--o)';
                winOverlay.classList.remove('opacity-0','pointer-events-none');
                winContent.classList.remove('scale-90');
                winContent.classList.add('scale-100');
            }, 500);
        } else {
            setTimeout(() => {
                document.getElementById('win-emoji').textContent = '🤝';
                const nameEl = document.getElementById('winner-name');
                nameEl.textContent = "IT'S A DRAW";
                nameEl.style.color = 'white';
                winOverlay.classList.remove('opacity-0','pointer-events-none');
                winContent.classList.remove('scale-90');
                winContent.classList.add('scale-100');
            }, 500);
        }
    }

    function closeOverlay() {
        winOverlay.classList.add('opacity-0','pointer-events-none');
        winContent.classList.add('scale-90');
        winContent.classList.remove('scale-100');
        newGame();
    }

    function triggerConfetti() {
        const end = Date.now() + 3000;
        (function frame() {
            confetti({ particleCount:3, angle:60,  spread:55, origin:{x:0}, colors:['#22d3ee','#f472b6'] });
            confetti({ particleCount:3, angle:120, spread:55, origin:{x:1}, colors:['#22d3ee','#f472b6'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        })();
    }

    // ── Flask API ──
    cells.forEach(cell => {
        cell.addEventListener('click', () => makeMove(parseInt(cell.dataset.index)));
    });

    async function makeMove(index) {
        const res  = await fetch('/move', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ index })
        });
        const data = await res.json();
        if (data.status === 'invalid') return;

        lastPlacedIndex = index;
        renderBoard(data.board, data.placed_X || [], data.placed_O || []);

        if (data.status === 'win') {
            gamesPlayed++;
            document.getElementById('counter').textContent = `Games played: ${gamesPlayed}`;
            showOverlay('win', data.winner, data.board);
            return;
        }
        if (data.status === 'draw') {
            gamesPlayed++;
            document.getElementById('counter').textContent = `Games played: ${gamesPlayed}`;
            showOverlay('draw', null, data.board);
            return;
        }
        setStatus(data.current_player);
    }

    async function newGame() {
        await fetch('/reset', { method: 'POST' });
        lastPlacedIndex = null;
        renderBoard(['','','','','','','','',''], [], []);
        setStatus('X');
    }
</script>
</body>
</html>
